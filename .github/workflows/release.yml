name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump'
        type: choice
        required: true
        options:
          - patch
          - minor
          - major

jobs:
  release-pr:
    name: Open release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create branch and commit
        run: |
          BRANCH="release/${{ steps.bump.outputs.version }}"
          git checkout -b "$BRANCH"
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git push origin "$BRANCH"

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_URL=$(gh pr create \
            --base main \
            --head "release/${{ steps.bump.outputs.version }}" \
            --title "chore(release): ${{ steps.bump.outputs.version }}" \
            --body "Automated release PR. Merging triggers publish to npm.")
          echo "Opened: $PR_URL"
          {
            echo "### Release PR opened for ${{ steps.bump.outputs.version }}"
            echo ""
            echo "[$PR_URL]($PR_URL)"
            echo ""
            echo "Merge to publish to npm."
          } >> "$GITHUB_STEP_SUMMARY"
