name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Check if version is already published
        id: detect
        run: |
          PKG=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view "$PKG@$VERSION" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "$PKG@$VERSION is already on npm, skipping publish"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$PKG@$VERSION is not on npm, will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Dependencies
        if: steps.detect.outputs.publish == 'true'
        run: npm ci

      - name: Publish to npm
        if: steps.detect.outputs.publish == 'true'
        run: npm publish

      - name: Configure git
        if: steps.detect.outputs.publish == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        if: steps.detect.outputs.publish == 'true'
        run: |
          TAG="v${{ steps.detect.outputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
